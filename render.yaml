databases:
  - name: route44-db
    plan: free

services:
  - type: web
    name: route44-frontend
    runtime: node
    buildCommand: cd route44-frontend && npm install && npm run build
    startCommand: cd route44-frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: route44-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: route44-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://route44-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.7

  - type: cron
    name: route44-db-heartbeat
    runtime: python
    plan: free
    schedule: "*/5 * * * *"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python heartbeat.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: route44-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.7
